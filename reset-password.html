<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Koneksyon – Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#E63946" />

  <style>
    :root {
      --primary: #E63946;
      --primary-dark: #B91C2C;
      --gold: #F4B942;
      --ink: #161616;
      --muted: #6B7280;
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(255, 255, 255, 0.55);
      --shadow: 0 30px 80px rgba(20, 20, 43, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(230, 57, 70, 0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(244, 185, 66, 0.25), transparent 34%),
        linear-gradient(135deg, #fff8f3 0%, #fff 45%, #f8f7ff 100%);
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .pattern {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        linear-gradient(rgba(230, 57, 70, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230, 57, 70, 0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 75%);
    }

    .orb {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      filter: blur(16px);
      opacity: 0.35;
    }

    .orb.one {
      top: 8%;
      right: 12%;
      background: #E63946;
    }

    .orb.two {
      bottom: 10%;
      left: 10%;
      background: #F4B942;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      padding: 42px 30px 34px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      animation: rise 700ms ease both;
    }

    .brand-mark {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, var(--primary), #FF6B6B),
        linear-gradient(135deg, #fff, #fff);
      color: white;
      box-shadow: 0 18px 40px rgba(230, 57, 70, 0.35);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2.15rem;
      font-style: italic;
      font-weight: 700;
    }

    .logo {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-style: italic;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--primary);
    }

    .tagline {
      margin: 10px auto 0;
      max-width: 310px;
      font-size: 0.98rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .status {
      margin: 28px auto 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(230, 57, 70, 0.08);
      color: var(--primary-dark);
      font-size: 0.92rem;
      font-weight: 650;
    }

    .loader {
      width: 42px;
      height: 42px;
      margin: 26px auto 24px;
      border-radius: 50%;
      border: 4px solid rgba(230, 57, 70, 0.16);
      border-top-color: var(--primary);
      animation: spin 900ms linear infinite;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), #FF5964);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: -0.01em;
      box-shadow: 0 16px 34px rgba(230, 57, 70, 0.32);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 42px rgba(230, 57, 70, 0.4);
    }

    .helper {
      margin: 18px 0 0;
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .footer {
      margin-top: 28px;
      font-size: 0.76rem;
      color: #9CA3AF;
    }

    .accent-line {
      width: 72px;
      height: 5px;
      margin: 22px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 420px) {
      .card {
        padding: 36px 22px 28px;
        border-radius: 26px;
      }

      .brand-mark {
        width: 68px;
        height: 68px;
        border-radius: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="pattern"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <section class="card" aria-labelledby="page-title">
      <div class="brand-mark" aria-hidden="true">K</div>

      <h1 id="page-title" class="logo">Koneksyon</h1>

      <p class="tagline">
        Securely opening the app so you can reset your password.
      </p>

      <div class="accent-line"></div>

      <div class="loader" aria-hidden="true"></div>

      <p class="status">
        Opening Koneksyon…
      </p>

      <p class="helper">
        If the app does not open automatically, tap the button below.
      </p>

      <a id="deeplink" class="button" href="#">
        Open Koneksyon
        <span aria-hidden="true">→</span>
      </a>

      <p class="footer">
        Authentic connections. Real compatibility.
      </p>

      <noscript>
        <p class="helper">
          JavaScript is required to open the app automatically.
        </p>
      </noscript>
    </section>
  </main>

  <script>
    const search = window.location.search;
    const hash = window.location.hash;
    const deepLink = "koneksyon://reset-password" + search + hash;

    const deepLinkButton = document.getElementById("deeplink");
    deepLinkButton.href = deepLink;

    // Small delay feels smoother and gives the page time to render.
    setTimeout(() => {
      window.location.href = deepLink;
    }, 700);
  </script>
</body>
</html>
